# 注意 : 他projectと違うので上書きしないこと（詳しくは末尾を参照）
name: Call Windows Cargo Check for mmlabc-to-smf-rust

on:
  pull_request: # メリットは最速で致命的な問題発生を検知できること。デメリットは頻繁すぎ？対策はしばらく運用して様子見
    types: [closed]
#  schedule: # pull_requestで実施するならこちらは不要の考え
#    # Japan time 03:00 (UTC 18:00 previous day)
#    - cron: '0 18 * * *'
  workflow_dispatch: # test用

permissions:
  contents: read
  issues: write

jobs:
  rust-windows-cargo-check:
    uses: cat2151/github-actions/.github/workflows/rust-windows-cargo-check.yml@main
    with:
      # この repo 固有差分:
      # - Cargo.toml だけでは wasm crate 側のテストを拾えない
      # - Windows runner 前提なので manifest path も Windows 形式で渡す
      extra-test-commands: |
        cargo test --all-targets
        cargo test --manifest-path mmlabc-to-smf-wasm\Cargo.toml --all-targets
